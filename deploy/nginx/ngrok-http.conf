# Example for running Nginx on :80 while ngrokd listens on 127.0.0.1:8080.
# Put this in the http {} context, or include it from sites-enabled.
map $http_upgrade $connection_upgrade {
    default upgrade;
    "" close;
}

server {
    listen 80;
    server_name *.example.com;

    access_log /var/log/nginx/ngrok-access.log;
    error_log /var/log/nginx/ngrok-error.log warn;

    client_max_body_size 0;
    proxy_request_buffering off;
    proxy_buffering off;
    proxy_http_version 1.1;

    location / {
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_pass http://127.0.0.1:8080;
    }
}
