# Example for HTTPS tunnel passthrough when Nginx owns :443.
# This file belongs in the top-level stream {} context, not http {}.
#
# If the same Nginx also serves normal HTTPS sites, route by SNI here.
# Send ngrok wildcard domains to ngrokd's internal HTTPS listener and change
# the default backend to your normal HTTPS service.
map $ssl_preread_server_name $ngrok_https_backend {
    ~(^|\.)example\.com$ 127.0.0.1:8443;
    default 127.0.0.1:9443;
}

server {
    listen 443;
    proxy_pass $ngrok_https_backend;
    ssl_preread on;
}
